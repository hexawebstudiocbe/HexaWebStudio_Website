name = "contact-form-handler"
main = "src/index.js"
compatibility_date = "2024-01-01"

[vars]
# CORS Origin configurations - change to your production domain in production
ALLOWED_ORIGIN = "*"

# Under production, define the following variables as secret using:
# wrangler secret put APPS_SCRIPT_URL
# wrangler secret put AUTH_TOKEN
#
# But for local dev fallback or default config:
APPS_SCRIPT_URL = "https://script.google.com/macros/s/YOUR_DEPLOYED_APP_SCRIPT_ID/exec"
AUTH_TOKEN = "YOUR_SHARED_SECRET_TOKEN"
